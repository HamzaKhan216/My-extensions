<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omni-Copilot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h2><img src="icon.png" alt="" class="logo">  Omni-Copilot</h2>
    <div class="header-actions">
      <button id="history-btn" title="History" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <img src="history.png" alt="History" width="18" height="18" style="opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
      </button>
      <button id="settings-btn" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- Settings Panel (Animated) -->
  <div id="settings-panel">
    <div class="settings-content">
      <label>AI Provider:</label>
      <select id="provider-select">
        <option value="openai">OpenAI</option>
        <option value="gemini">Google Gemini</option>
        <option value="claude">Anthropic Claude</option>
        <option value="groq">Groq</option>
        <option value="nvidia">Nvidia (NIM)</option>
      </select>

      <label>Model Name (Optional):</label>
      <input type="text" id="model-input" placeholder="e.g. gpt-4o, llama3-8b-8192...">

      <label>API Key:</label>
      <input type="password" id="apikey-input" placeholder="Enter your API Key">

      <label>System Prompt (Optional):</label>
      <textarea id="system-prompt-input" rows="2" placeholder="Custom instructions for AI (e.g. Be concise)"></textarea>

      <button id="save-settings-btn">Save Settings</button>
    </div>
  </div>

  <!-- History Panel (Animated) -->
  <div id="history-panel">
    <div class="history-content">
      <div class="history-header">
        <h3>Recent Chats</h3>
        <button id="new-chat-btn">New Chat</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-wrapper" style="position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden;">
    <div class="chat-container" id="chat-container">
      <div class="message ai-message">
        Hello! I'm your Omni-Copilot. Select a provider, enter your API key in settings, and ask me anything about the web page you are viewing!
      </div>
    </div>
    <button id="scroll-bottom-btn" class="scroll-bottom-btn hidden">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
    </button>
  </div>

  <!-- Input Area -->
  <div class="input-container">
    <div class="input-controls-row">
      <label class="context-toggle" for="read-page-toggle">
        <input type="checkbox" id="read-page-toggle" checked>
        <span class="toggle-text">Read Current Page</span>
      </label>
      
      <div class="quick-actions">
        <button class="quick-btn" data-prompt="Summarize this page.">Summarize</button>
        <button class="quick-btn" data-prompt="What are the key takeaways here?">Key Takeaways</button>
      </div>
    </div>

    <div id="image-preview-container"></div>

    <div class="input-wrapper">
      <textarea id="prompt-input" rows="1" placeholder="Ask something..."></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"></path></svg>
      </button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
